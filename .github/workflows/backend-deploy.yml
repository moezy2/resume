name: Deploy Backend to Azure Functions

on:
  push:
    paths:
      - 'backend/**' # Only runs when you change something in the backend folder
    branches:
      - main

env:
  AZURE_FUNCTIONAPP_NAME: 'moe-resume-api-2026' # REPLACE THIS with your actual Function App name
  PYTHON_VERSION: '3.11' # Check if your Azure Function is 3.9 or 3.10

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v3

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 'Resolve Project Dependencies Using Pip'
      shell: bash
      run: |
        pushd './backend'
        python -m pip install --upgrade pip
        pip install -r requirements.txt --target=".python_packages/lib/site-packages"
        popd

    - name: 'Run Azure Functions Action'
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: './backend'
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }